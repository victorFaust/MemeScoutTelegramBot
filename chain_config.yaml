# chain_config.yaml -- Per-chain filter thresholds and safety check settings.
# Only Solana and Robinhood Chain are active.
# Any chain in CHAINS (.env) without an entry here will use "default".

default:
  poll_interval_seconds: 180
  min_liquidity_usd: 5000
  max_liquidity_usd: 50000
  max_market_cap: 500000
  max_pair_age_hours: 168
  min_volume_liquidity_ratio: 0.5
  min_price_change_1h: 0.0
  min_price_change_6h: 0.0
  min_buy_sell_ratio: 1.0
  min_txns_1h: 10
  min_alert_score: 50
  momentum_realert_threshold: 15

  weights:
    liquidity: 12
    market_cap: 12
    pair_age: 8
    vol_liq_ratio: 18
    price_change: 18
    buy_sell_ratio: 17
    velocity: 15

  safety:
    max_buy_tax_pct: 10
    max_sell_tax_pct: 10
    max_top10_holder_pct: 70
    reject_honeypot: true
    reject_mint_authority: true
    reject_blacklist: true

solana:
  poll_interval_seconds: 180
  min_liquidity_usd: 3000
  max_liquidity_usd: 100000
  max_market_cap: 1000000
  max_pair_age_hours: 168
  min_volume_liquidity_ratio: 0.3
  min_price_change_1h: -5.0
  min_price_change_6h: -10.0
  min_buy_sell_ratio: 1.0
  min_txns_1h: 8
  min_alert_score: 40
  momentum_realert_threshold: 8
  min_rugcheck_score: 0.5
  min_lp_locked_pct: 50
  max_top1_holder_pct: 40
  min_buy_quality: 0.15
  reject_serial_deployers: true

  weights:
    liquidity: 12
    market_cap: 12
    pair_age: 8
    vol_liq_ratio: 18
    price_change: 18
    buy_sell_ratio: 17
    velocity: 15

  safety:
    max_buy_tax_pct: 10
    max_sell_tax_pct: 10
    max_top10_holder_pct: 70
    reject_honeypot: true
    reject_mint_authority: true
    reject_blacklist: true
